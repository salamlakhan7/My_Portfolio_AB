{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Salam | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        
        /* Set scroll-behavior to smooth for a better UX */
        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0;
        }

        .perspective { perspective: 2000px; }
        .preserve-3d { transform-style: preserve-3d; }
        
        .glass-sidebar { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255,255,255,0.05); 
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body class="flex">

    <aside class="fixed inset-y-0 left-0 w-80 glass-sidebar z-50 flex flex-col items-center py-12 px-8 overflow-y-auto">
        <div class="relative group mb-10 shrink-0">
            <div class="absolute -inset-2 bg-gradient-to-b from-blue-600 to-cyan-400 rounded-2xl blur opacity-20 group-hover:opacity-50 transition duration-1000"></div>
            <div class="relative w-48 h-56 rounded-2xl overflow-hidden border border-slate-700 shadow-2xl">
                <img src="{% static 'images/profile.png' %}" alt="Abdul Salam" 
                     class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 scale-110 group-hover:scale-100">
            </div>
            <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-blue-600 px-4 py-1 rounded-full shadow-xl">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] whitespace-nowrap">Abdul Salam</span>
            </div>
        </div>

        <nav class="flex flex-col w-full gap-2 mt-4">
            <a href="{% url 'landing_page' %}" class="group flex items-center justify-between px-6 py-4 rounded-xl hover:bg-white/5 transition-all border border-transparent hover:border-slate-800">
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 group-hover:text-white">Home</span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></span>
            </a>
            <a href="{% url 'edu_page' %}" class="group flex items-center justify-between px-6 py-4 rounded-xl hover:bg-white/5 transition-all border border-transparent hover:border-slate-800">
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 group-hover:text-white">Education</span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></span>
            </a>
            <a href="{% url 'skills_page' %}" class="group flex items-center justify-between px-6 py-4 rounded-xl hover:bg-white/5 transition-all border border-transparent hover:border-slate-800">
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 group-hover:text-white">Skills</span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></span>
            </a>
            <a href="{% url 'projects_page' %}" class="group flex items-center justify-between px-6 py-4 rounded-xl hover:bg-white/5 transition-all border border-transparent hover:border-slate-800">
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 group-hover:text-white">Projects</span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></span>
            </a>
            <a href="{% url 'experience_page' %}" class="group flex items-center justify-between px-6 py-4 rounded-xl hover:bg-white/5 transition-all border border-transparent hover:border-slate-800">
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 group-hover:text-white">Experience</span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></span>
            </a>
            <a href="{% url 'contact_page' %}" class="group flex items-center justify-between px-6 py-4 rounded-xl hover:bg-white/5 transition-all border border-transparent hover:border-slate-800">
                <span class="text-xs font-bold tracking-widest uppercase text-slate-400 group-hover:text-white">Contact</span>
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></span>
            </a>
        </nav>

        <div class="mt-auto pt-10 flex gap-4 shrink-0">
            <a href="https://github.com/salamlakhan7" target="_blank" 
               class="w-10 h-10 rounded-xl bg-slate-800/50 flex items-center justify-center hover:bg-white hover:text-black transition-all duration-300 border border-white/5 shadow-lg group">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>

            <a href="https://www.linkedin.com/in/abdul-salam-501b2025b/" target="_blank" 
               class="w-10 h-10 rounded-xl bg-slate-800/50 flex items-center justify-center hover:bg-[#0077b5] hover:text-white transition-all duration-300 border border-white/5 shadow-lg group">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                    <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
            </a>
        </div>
    </aside>

    <main class="flex-1 ml-80 min-h-screen perspective">
        <div id="main-scene" class="min-h-screen w-full p-12 py-24 flex flex-col transition-transform duration-200 ease-out preserve-3d">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        const scene = document.getElementById('main-scene');
        
        window.addEventListener('mousemove', (e) => {
            // Use window relative coordinates for 3D effect regardless of scroll
            const xAxis = (window.innerWidth / 2 - e.clientX) / 100;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 100;
            scene.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        window.addEventListener('mouseleave', () => {
            scene.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
